<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Minha Pokedex Spring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .poke-card { max-width: 300px; margin: 50px auto; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .poke-img { background-color: #eee; border-radius: 50%; width: 150px; height: 150px; margin: 20px auto; display: block; }
    </style>
</head>
<body>
<div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
<div class="container text-center">
    <h1 class="mt-5">Pokedex do João</h1>

    <form th:action="@{/pokemon/pokedex}" method="get" class="mt-4">
        <input type="text" name="nome" placeholder="Digite o nome do Pokémon" required>
        <button type="submit" class="btn btn-danger">Buscar</button>
    </form>

    <div th:if="${pokemon}" class="card poke-card">
        <img th:src="${pokemon.imagemUrl}" class="poke-img" alt="Imagem do Pokemon">
        <div class="card-body">
            <h3 th:text="${#strings.capitalize(pokemon.nome)}">Nome</h3>
            <p>ID: <span th:text="${pokemon.id}"></span></p>
            <div class="badge bg-primary me-1" th:each="tipo : ${pokemon.tipos}" th:text="${tipo}"></div>
        </div>
    </div>
</div>
</body>
</html>
